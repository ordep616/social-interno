openapi: 3.1.0
info:
  title: API do Sistema Interno de Comunicação
  version: 1.0.0-draft
  description: Contrato preliminar para desenvolvimento independente de frontend e backend.
servers:
  - url: /api/v1
security:
  - sessionCookie: []
paths:
  /health:
    get:
      operationId: getHealth
      security: []
      responses:
        "200":
          description: Serviço disponível.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /me:
    get:
      operationId: getCurrentUser
      responses:
        "200":
          description: Usuário autenticado e capacidades disponíveis.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CurrentUser"
        "401":
          $ref: "#/components/responses/Unauthorized"
  /users:
    get:
      operationId: listUsers
      parameters:
        - $ref: "#/components/parameters/Cursor"
        - name: query
          in: query
          schema: { type: string, maxLength: 100 }
      responses:
        "200":
          description: Diretório interno paginado.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items: { $ref: "#/components/schemas/UserSummary" }
                  nextCursor: { type: [string, "null"] }
  /conversations:
    get:
      operationId: listConversations
      parameters:
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Conversas do usuário.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ConversationPage"
    post:
      operationId: createConversation
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [kind, memberIds]
              properties:
                kind: { type: string, enum: [direct, group] }
                title: { type: [string, "null"], maxLength: 120 }
                memberIds:
                  type: array
                  minItems: 1
                  items: { type: string }
      responses:
        "201":
          description: Conversa criada.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Conversation" }
        "400": { $ref: "#/components/responses/BadRequest" }
  /conversations/{conversationId}/messages:
    parameters:
      - $ref: "#/components/parameters/ConversationId"
    get:
      operationId: listMessages
      parameters:
        - $ref: "#/components/parameters/Cursor"
      responses:
        "200":
          description: Histórico autorizado.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/MessagePage" }
        "403": { $ref: "#/components/responses/Forbidden" }
        "404": { $ref: "#/components/responses/NotFound" }
    post:
      operationId: createMessage
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [clientId, body]
              properties:
                clientId: { type: string, description: Identificador idempotente criado pelo cliente. }
                body: { type: string, minLength: 1, maxLength: 10000 }
                replyToId: { type: [string, "null"] }
                attachmentIds:
                  type: array
                  items: { type: string }
      responses:
        "201":
          description: Mensagem persistida.
          content:
            application/json:
              schema: { $ref: "#/components/schemas/Message" }
        "400": { $ref: "#/components/responses/BadRequest" }
        "403": { $ref: "#/components/responses/Forbidden" }
  /conversations/{conversationId}/read:
    post:
      operationId: markConversationRead
      parameters:
        - $ref: "#/components/parameters/ConversationId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [messageId]
              properties:
                messageId: { type: string }
      responses:
        "204": { description: Marcador atualizado. }
        "403": { $ref: "#/components/responses/Forbidden" }
  /uploads:
    post:
      operationId: createUpload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [fileName, mediaType, sizeBytes]
              properties:
                fileName: { type: string, maxLength: 255 }
                mediaType: { type: string, maxLength: 100 }
                sizeBytes: { type: integer, minimum: 1 }
      responses:
        "201":
          description: Upload autorizado.
          content:
            application/json:
              schema:
                type: object
                required: [attachmentId, uploadUrl, expiresAt]
                properties:
                  attachmentId: { type: string }
                  uploadUrl: { type: string, format: uri }
                  expiresAt: { type: string, format: date-time }
        "400": { $ref: "#/components/responses/BadRequest" }
components:
  securitySchemes:
    sessionCookie:
      type: apiKey
      in: cookie
      name: session
  parameters:
    Cursor:
      name: cursor
      in: query
      schema: { type: string }
    ConversationId:
      name: conversationId
      in: path
      required: true
      schema: { type: string }
  responses:
    BadRequest:
      description: Requisição inválida.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Unauthorized:
      description: Sessão ausente ou inválida.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    Forbidden:
      description: Usuário sem permissão.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
    NotFound:
      description: Recurso inexistente ou não visível para o usuário.
      content: { application/json: { schema: { $ref: "#/components/schemas/Error" } } }
  schemas:
    Health:
      type: object
      required: [status]
      properties:
        status: { type: string, const: ok }
    Error:
      type: object
      required: [code, message, requestId]
      properties:
        code: { type: string }
        message: { type: string }
        requestId: { type: string }
        details: { type: [object, "null"], additionalProperties: true }
    UserSummary:
      type: object
      required: [id, displayName, status]
      properties:
        id: { type: string }
        displayName: { type: string }
        avatarUrl: { type: [string, "null"], format: uri }
        status: { type: string, enum: [active, blocked] }
    CurrentUser:
      allOf:
        - $ref: "#/components/schemas/UserSummary"
        - type: object
          required: [email, roles, capabilities]
          properties:
            email: { type: string, format: email }
            roles:
              type: array
              items: { type: string, enum: [user, admin, auditor] }
            capabilities:
              type: array
              items: { type: string }
    Conversation:
      type: object
      required: [id, kind, members, unreadCount, updatedAt]
      properties:
        id: { type: string }
        kind: { type: string, enum: [direct, group, announcement] }
        title: { type: [string, "null"] }
        members:
          type: array
          items: { $ref: "#/components/schemas/UserSummary" }
        lastMessage: { anyOf: [{ $ref: "#/components/schemas/Message" }, { type: "null" }] }
        unreadCount: { type: integer, minimum: 0 }
        updatedAt: { type: string, format: date-time }
    ConversationPage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Conversation" }
        nextCursor: { type: [string, "null"] }
    Message:
      type: object
      required: [id, conversationId, author, body, attachments, createdAt]
      properties:
        id: { type: string }
        clientId: { type: [string, "null"] }
        conversationId: { type: string }
        author: { $ref: "#/components/schemas/UserSummary" }
        body: { type: string }
        replyToId: { type: [string, "null"] }
        attachments:
          type: array
          items: { $ref: "#/components/schemas/Attachment" }
        createdAt: { type: string, format: date-time }
        editedAt: { type: [string, "null"], format: date-time }
        deletedAt: { type: [string, "null"], format: date-time }
    MessagePage:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items: { $ref: "#/components/schemas/Message" }
        nextCursor: { type: [string, "null"] }
    Attachment:
      type: object
      required: [id, fileName, mediaType, sizeBytes, scanStatus]
      properties:
        id: { type: string }
        fileName: { type: string }
        mediaType: { type: string }
        sizeBytes: { type: integer }
        scanStatus: { type: string, enum: [pending, clean, blocked] }
        accessUrl: { type: [string, "null"], format: uri }
